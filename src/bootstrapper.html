<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K's Macros — Launcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="bootstrapper.css">
</head>

<body>

    <div class="flash-overlay" id="flashOverlay"></div>
    <div class="drag-region"></div>

    <div class="shell">

        <div class="header">
            <div class="brand-mark"></div>
            <div class="brand-info">
                <span class="brand-name">K's Macros</span>
                <span class="brand-sub">Launcher</span>
            </div>
            <span class="ver-badge" id="footerVer">v0.0.0</span>
        </div>

        <div class="update-notice" id="updateBadge">
            <div class="update-dot"></div>
            <div class="update-text">
                <div class="update-title">Update available — <span id="newVer">v0.0.0</span></div>
                <div class="update-desc">You are on <span id="curVer">—</span></div>
            </div>
        </div>

        <div class="sysinfo">
            <div class="sysinfo-card">
                <div class="sysinfo-label">Memory</div>
                <div class="sysinfo-value" id="sysRam">—</div>
                <div class="sysinfo-sub" id="sysRamSub">loading…</div>
            </div>
            <div class="sysinfo-card">
                <div class="sysinfo-label">Launches</div>
                <div class="sysinfo-value" id="sysLaunches">—</div>
                <div class="sysinfo-sub">total</div>
            </div>
            <div class="sysinfo-card">
                <div class="sysinfo-label">Status</div>
                <div class="sysinfo-value" id="sysStatus">—</div>
                <div class="sysinfo-sub" id="sysStatusSub">environment</div>
            </div>
        </div>

        <div class="steps" id="stepsContainer">

            <div class="step active" id="step-update">
                <div class="step-icon" id="icon-update">
                    <div class="spinner"></div>
                </div>
                <div class="step-body">
                    <div class="step-top">
                        <div class="step-label">Checking for updates</div>
                        <div class="step-ts" id="ts-update">—</div>
                    </div>
                    <div class="step-detail" id="detail-update">Contacting GitHub…</div>
                </div>
            </div>

            <div class="step skipped" id="step-kill">
                <div class="step-icon" id="icon-kill">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                        <path d="M10 11v6" />
                        <path d="M14 11v6" />
                    </svg>
                </div>
                <div class="step-body">
                    <div class="step-top">
                        <div class="step-label">Cleaning up old processes</div>
                        <div class="step-ts" id="ts-kill">—</div>
                    </div>
                    <div class="step-detail" id="detail-kill">Waiting…</div>
                </div>
            </div>

        </div>

        <div class="log-wrap">
            <div class="log-header">
                <span class="log-title">Console</span>
                <div class="log-dot" id="logDot"></div>
            </div>
            <div class="log-body" id="logBody"></div>
        </div>

        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="action-row" id="updateRow">
            <button class="btn btn-warn" onclick="downloadUpdate()">Download Update</button>
            <button class="btn" onclick="dismissUpdate()">Skip</button>
        </div>

        <button class="btn btn-launch" id="btnLaunch" disabled onclick="launchApp()">Preparing…</button>

        <div class="footer">
            <div class="footer-ver" id="footerVerBottom"></div>
            <div class="status-row">
                <div class="sdot pulse" id="statusDot"></div>
                <span id="statusLabel">Initializing…</span>
            </div>
        </div>

    </div>

    <script src="bootstrapper.js"></script>
</body>

</html>
